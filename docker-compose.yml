version: '3.8'

services:
  # --- DATABASE ---
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: devel
      POSTGRES_PASSWORD: devel
      POSTGRES_DB: autoparts
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: